<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Grade Input Page</title>
        <link rel="stylesheet" href="../css/mySite.css">
    </head>
    <body>
        <h1>Please Enter The New Grade Information</h1>
        <form method="POST" action="../php/save_grade.php" id="gradeform">
            <div class="formrow">
                <div id="semestercontainer">
                    <label for="semester">Semester:</label>
                    <input type="text" name="semester" id="semester" placeholder="Fall,Spring,...">
                </div>
                <div id="yearcontainer">
                    <label for="year">Year:</label>
                    <input type="number" name="year" id="year" min="1920" max="2026" step="1" placeholder="2026">
                </div>
            </div>
            <div class="formrow">
                <div id="coursecontainer">
                    <label for="courseid">Course I.D.:</label>
                    <input type="text" name="courseid" id="courseid" placeholder="COP3813">
                </div>
                <div id="creditcontainer">
                    <label for="credithours">Credit Hours:</label>
                    <input type="text" name="credithours" id="credithours" placeholder="3">
                </div>
            </div>
            <fieldset id="gradecontainer">
                <legend>Grade</legend>
                <div class="graderow">
                    <div>
                        <label for="aminus">A-</label>
                        <input type="radio" name="grades" id="aminus" value="A-">
                    </div>
                    <div>
                        <label for="a">A</label>
                        <input type="radio" name="grades" id="a" value="A">
                    </div>
                    <div>
                        <label for="aplus">A+</label>
                        <input type="radio" name="grades" id="aplus" value="A+">
                    </div>
                </div>
                <div class="graderow">
                    <div>
                        <label for="bminus">B-</label>
                        <input type="radio" name="grades" id="bminus" value="B-">
                    </div>
                    <div>
                        <label for="b">B</label>
                        <input type="radio" name="grades" id="b" value="B">
                    </div>
                    <div>
                        <label for="bplus">B+</label>
                        <input type="radio" name="grades" id="bplus" value="B+">
                    </div>
                </div>
                <div class="graderow">
                    <div>
                        <label for="cminus">C-</label>
                        <input type="radio" name="grades" id="cminus" value="C-">
                    </div>
                    <div>
                        <label for="c">C</label>
                        <input type="radio" name="grades" id="c" value="C">
                    </div>
                    <div>
                        <label for="cplus">C+</label>
                        <input type="radio" name="grades" id="cplus" value="C+">
                    </div>
                </div>
                <div class="graderow">
                    <div>
                        <label for="dminus">D-</label>
                        <input type="radio" name="grades" id="dminus" value="D-">
                    </div>
                    <div>
                        <label for="d">D</label>
                        <input type="radio" name="grades" id="d" value="D">
                    </div>
                    <div>
                        <label for="dplus">D+</label>
                        <input type="radio" name="grades" id="dplus" value="D+">
                    </div>
                </div>
                <div class="graderow">
                    <div>
                        <label for="f">F</label>
                        <input type="radio" name="grades" id="f" value="F">
                    </div>
                    <div>
                        <label for="w">W</label>
                        <input type="radio" name="grades" id="w" value="W">
                    </div>
                    <div>
                        <label for="i">I</label>
                        <input type="radio" name="grades" id="i" value="I">
                    </div>
                </div>
            </fieldset>
            <div id="instructorcontainer">
                <label for="instructor">Instructor:</label>
                <input type="text" name="instructor" id="instructor" placeholder="Dr. Dolittle">
            </div>
            <div id="gradesubmitcontainer">
                <input button type="submit" value="Add Grade">
            </div>
            <div>
                <input type="button" value="Return to Previous Page" onclick="location.href='user.html'">
            </div>
        </form>
    </body>
</html>
