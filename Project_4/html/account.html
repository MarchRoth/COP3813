<!DOCTYPE html>
<html>
    <head>
        <title>Account Creation Page</title>
        <link rel="stylesheet" href="../css/mySite.css">
        <script src="../javascript/validateaccount.js" defer></script>
    </head>
    <body>
        <h1>Account Creation Page</h1>
        <h2>Create An Account</h2>
        <form id="newuser" action="../php/register.php" method="POST">
            <div class="idcontainer">
                <label for="newid">Student I.D.</label>
                <input type="text" name="newid" id="newid" placeholder="Enter New Student I.D.">
                <span id="iderror"></span>
            </div>
            <div class="passwordcontainer">
                <label for="createpassword">Password</label>
                <input type="text" name="createpassword" id="createpassword" placeholder="Enter New Password">
                <span id="passworderror"></span>
            </div>
            <div class="passwordcontainer">
                <label for="confirmpassword">Confirm Password</label>
                <input type="text" name="confirmpassword" id="confirmpassword" placeholder="Confirm New Password">
                <span id="confirmationerror"></span>
            </div>
            <div id="createbutton">
                <input type="submit" value="Create Account">
            </div>
            <div id="creationreset">
                <input type="reset">
            </div>
        </form>
        <h2>Existing User Login</h2>
        <form id="existinguser">
            <div class="idcontainer">
                <label for="existingid">Student I.D.</label>
                <input type="text" name="existingid" id="existingid" placeholder="Enter Your Student I.D.">
                <span id="existingiderror"></span>

            </div>
            <div class="passwordcontainer">
                <label for="existingpassword">Password</label>
                <input type="text" name="existingpassword" id="existingpassword" placeholder="Enter Your Password">
                <span id="existingpassworderror"></span>
            </div>
            <div id="login">
                <input type="submit" value="Login">
            </div>
            <div id="loginreset">
                <input type="reset">
            </div>
        </form>
    </body>
</html>
